server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    jdbc-url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  data:
    mongodb:
      uri: mongodb://localhost:27017/chatdb

    redis:
      url: redis://localhost:6379
      # 또는 host/port 방식:
      # host: localhost
      # port: 6379

  thymeleaf:
    cache: false

second:
  datasource:
    jdbc-url: ${SECONDARY_DB_URL}
    username: ${SECONDARY_DB_USERNAME}
    password: ${SECONDARY_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

secondary:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.SQL: debug