server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
      open-in-view: false

    thymeleaf:
      cache: false

    redis:
      host: localhost
      port: 6379

secondary-datasource:
  url:
  username:
  password:
  driver-class-name: org.postgresql.Driver

logging:
  level:
    org.hibernate.SQL: debug