<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Candidate WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h2>WebSocket Candidate Test</h2>

<div>
    <label>JWT Token: <input type="text" id="token" placeholder="Bearer 토큰 입력" style="width:400px;"></label><br><br>
    <label>Room Code: <input type="text" id="roomCode" value="1234"></label><br><br>
    <label>Place ID: <input type="number" id="placeId" value="1"></label><br><br>
    <label>Action Type:
        <select id="actionType">
            <option value="ADD_PLACE">ADD_PLACE</option>
            <option value="REMOVE_PLACE">REMOVE_PLACE</option>
            <option value="ADD_VOTE" selected>ADD_VOTE</option>
            <option value="REMOVE_VOTE">REMOVE_VOTE</option>
        </select>
    </label><br><br>

    <button onclick="connect()">Connect & Subscribe</button>
    <button onclick="sendMessage()">Send Message</button>
</div>

<hr>

<div id="log" style="white-space: pre-line; background: #f5f5f5; padding: 10px; border: 1px solid #ccc;">
</div>

<script>
    let stompClient = null;

    function log(m){ document.getElementById("log").textContent += m + "\n"; }

    function connect() {
        const token = document.getElementById("token").value
        if (!token) { alert("JWT 토큰을 입력하세요."); return; }

        const roomCode = document.getElementById("roomCode").value.trim();
        if (!roomCode) { alert("Room Code를 입력하세요."); return; }

        // ✅ 서버와 동일
        const socket = new SockJS("/ws-stomp");
        stompClient = Stomp.over(socket);

        stompClient.connect(
            { Authorization: token },
            () => {
                log("✅ Connected to WebSocket");
                // ✅ 브로커 프리픽스로 구독
                stompClient.subscribe(`/topic/candidate.${roomCode}`, (msg) => {
                    log("📩 Received: " + msg.body);
                });
                log(`📡 Subscribed to /topic/candidate.${roomCode}`);
            },
            (err) => log("❌ Connection failed: " + err)
        );
    }

    function sendMessage() {
        if (!stompClient || !stompClient.connected) {
            alert("먼저 WebSocket에 연결하세요"); return;
        }
        const roomCode = document.getElementById("roomCode").value.trim();
        const placeId = Number(document.getElementById("placeId").value);
        const actionType = document.getElementById("actionType").value;

        const payload = { placeId, actionType };

        // ✅ 앱 프리픽스 붙여서 전송
        stompClient.send(`/app/candidate.${roomCode}`, {}, JSON.stringify(payload));
        log(`📤 Sent: ${JSON.stringify(payload)}`);
    }
</script>
</body>
</html>
