<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커서 공유 테스트</title>
    <style>
        .cursor {
            position: absolute;
            width: 10px;
            height: 10px;
            background: red;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>
<h2>실시간 커서 공유</h2>
<input type="text" id="userId" placeholder="User ID">
<input type="text" id="roomId" placeholder="Room ID">
<button onclick="connect()">Connect</button>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    let stompClient;
    let userId, roomCode;

    const cursors = {};

    function connect() {
        userId = parseInt(document.getElementById('userId').value.trim());
        roomCode = document.getElementById('roomId').value.trim();

        if (isNaN(userId) || !roomCode) {
            alert("숫자 User ID와 Room ID를 입력하세요.");
            return;
        }

        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, () => {
            stompClient.subscribe(`/ws/subscribe/cursor/${roomCode}`, (msg) => {
                const data = JSON.parse(msg.body);
                if (data.userId === userId) return;

                let cursor = cursors[data.userId];
                if (!cursor) {
                    cursor = document.createElement('div');
                    cursor.className = 'cursor';
                    cursors[data.userId] = cursor;
                    document.body.appendChild(cursor);
                }
                cursor.style.left = `${data.x}px`;
                cursor.style.top = `${data.y}px`;
            });

            document.addEventListener('mousemove', (e) => {
                const payload = {
                    userId: userId,
                    roomCode: roomCode,
                    x: e.clientX,
                    y: e.clientY
                };
                stompClient.send("/ws/send/cursor", {}, JSON.stringify(payload));
            });
        });
    }

</script>
</body>
</html>
