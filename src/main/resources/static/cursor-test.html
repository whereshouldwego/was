<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커서 공유 테스트</title>
    <style>
        .cursor {
            position: absolute;
            width: 10px;
            height: 10px;
            background: red;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>
<h2>실시간 커서 공유</h2>
<input type="text" id="userId" placeholder="User ID">
<input type="text" id="roomId" placeholder="Room ID">
<button onclick="connect()">Connect</button>

<script>
    let socket;
    let userId, roomCode, jwtToken;
    const cursors = {};

    function connect() {
        userId = parseInt(document.getElementById('userId').value.trim());
        roomCode = document.getElementById('roomId').value.trim();

        if (isNaN(userId) || !roomCode) {
            alert("숫자 User ID, Room ID, JWT 토큰을 입력하세요.");
            return;
        }

        // 프로토콜 자동 결정 (https → wss, http → ws)
        const wsProtocol = window.location.protocol === 'https:' ? 'wss' : 'ws';

        // JWT 토큰을 쿼리 파라미터로 전달
        const wsUrl = `${wsProtocol}://${window.location.host}/ws/cursor?roomCode=${encodeURIComponent(roomCode)}&token=Bearer eyJhbGciOiJIUzI1NiJ9.eyJ1c2VybmFtZSI6Imd1ZXN0IGJlNDhkZmM5LTFmMDEtNGJjNS1iM2UyLWExZDZkMDE4NGY0NCIsInJvbGUiOiJST0xFX0dVRVNUIiwiY2F0ZWdvcnkiOiJhY2Nlc3MiLCJpYXQiOjE3NTQ5ODMxMDIsImV4cCI6MTc1NDk4NjcwMn0.mmE6uq5x61Nt_PpQB3JrkmfgiADcb0MPmug8dyiJ1sM`;
        console.log("Connecting to:", wsUrl);

        socket = new WebSocket(wsUrl);

        socket.onopen = () => {
            console.log("🟢 WebSocket 연결됨");

            // 마우스 이동 시 커서 위치 전송
            document.addEventListener('mousemove', (e) => {
                const payload = {
                    userId,
                    roomCode,
                    lat: e.clientY,
                    lng: e.clientX
                };
                socket.send(JSON.stringify(payload));
            });
        };

        socket.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.userId === userId) return; // 내 커서는 무시

                let cursor = cursors[data.userId];
                if (!cursor) {
                    cursor = document.createElement('div');
                    cursor.className = 'cursor';
                    cursors[data.userId] = cursor;
                    document.body.appendChild(cursor);
                }

                cursor.style.left = `${data.lng}px`;
                cursor.style.top = `${data.lat}px`;
            } catch (e) {
                console.error("❌ 메시지 파싱 오류:", event.data);
            }
        };

        socket.onclose = () => {
            console.log("🔴 WebSocket 연결 종료됨");
        };
    }
</script>
</body>
</html>
